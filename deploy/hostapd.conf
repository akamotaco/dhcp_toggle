# hostapd 설정 — dhcp-toggle 모드 C (AP 모드)
# SSID/비밀번호/채널 등을 환경에 맞게 수정하세요.
# 설치 후 위치: /usr/local/share/dhcp-toggle/hostapd.conf

interface=wlan0
bridge=br0
driver=nl80211

# Wi-Fi 기본 설정 — 5GHz 802.11ac
ssid=NanoPi-AP
channel=36
hw_mode=a

# 802.11n
ieee80211n=1
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40][RX-LDPC][TX-STBC][RX-STBC1][MAX-AMSDU-7935]

# 802.11ac (VHT)
ieee80211ac=1
vht_oper_chwidth=0
vht_capab=[SHORT-GI-80][RX-LDPC][TX-STBC-2BY1][MAX-MPDU-11454]

wmm_enabled=1

# 보안 (WPA2-PSK)
auth_algs=1
wpa=2
wpa_passphrase=changeme123
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# 국가 코드 (한국)
country_code=KR
ieee80211d=1
